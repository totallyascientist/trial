<!DOCTYPE html>
<html lang="en">
<head>
  <title>totallyascientist</title>
  <link rel="stylesheet" href="css/styles.css">
  <script defer src="js/main.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    /* Iframe Section Styling (matches your dark aesthetic) */
    .form-section {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
      background: #000;
    }

    .form-wrapper {
      width: 100%;
      max-width: 900px;
      aspect-ratio: 1 / 1.25; /* Adjust this to control height */
      border-radius: 12px;
      overflow: hidden;
      background: #111;
      box-shadow: 0 0 20px rgba(255,255,255,0.05);
    }

    .form-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .form-fallback {
      text-align: center;
      padding: 20px;
      background: #000;
      color: #aaa;
    }

    .form-fallback a {
      display: inline-block;
      margin-top: 10px;
      padding: 12px 20px;
      background: #fff;
      color: #000;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      transition: 0.2s ease;
    }

    .form-fallback a:hover {
      background: #ddd;
    }

    /* Mobile Optimization */
    @media (max-width: 600px) {
      .form-wrapper {
        aspect-ratio: 1 / 1.6;
      }
    }
  </style>
</head>

</header>
